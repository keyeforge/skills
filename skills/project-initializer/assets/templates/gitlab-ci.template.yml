image: {{DOCKER_IMAGE}}

stages:
  - commit-check
  - release-check
  - deploy

# ─────────────────────────────────────────────
# SHARED: Cache and before_script helpers
# ─────────────────────────────────────────────
.base_cache: &base_cache
  cache:
    key:
      files:
        - package-lock.json    # adjust to lockfile for your stack
        - requirements.txt     # remove if not Python
    paths:
      - node_modules/          # adjust to dependency cache dir for your stack
      - .venv/
    policy: pull-push

.install_deps: &install_deps
  before_script:
    - {{INSTALL_CMD}}

# ─────────────────────────────────────────────
# STAGE 1: COMMIT CHECK
# Runs on every push. Fast feedback loop.
# ─────────────────────────────────────────────
lint:
  stage: commit-check
  <<: *base_cache
  <<: *install_deps
  script:
    - {{LINT_CMD}}
  allow_failure: false

unit-tests:
  stage: commit-check
  <<: *base_cache
  <<: *install_deps
  script:
    - {{TEST_CMD}}
  artifacts:
    reports:
      junit: test-results.xml   # adjust to your test reporter output
    paths:
      - coverage/
    expire_in: 1 day

commit-format:
  stage: commit-check
  image: node:20-alpine
  script:
    # Validate that the latest commit follows Conventional Commits format
    - |
      COMMIT_MSG=$(git log -1 --pretty=%s)
      echo "Commit message: $COMMIT_MSG"
      if ! echo "$COMMIT_MSG" | grep -qE '^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\(.+\))?: .+'; then
        echo "ERROR: Commit message does not follow Conventional Commits format."
        echo "Expected: type(scope): description"
        echo "Valid types: feat fix docs style refactor test chore perf ci build revert"
        echo "See AGENTS.md for examples."
        exit 1
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

# ─────────────────────────────────────────────
# STAGE 2: RELEASE CHECK
# Runs on merge requests targeting {{MAIN_BRANCH}} and on pushes to {{MAIN_BRANCH}}.
# Stricter: coverage, security, SDD process docs.
# ─────────────────────────────────────────────
full-test-suite:
  stage: release-check
  <<: *base_cache
  <<: *install_deps
  script:
    - {{TEST_CMD}}
    - {{COVERAGE_CMD}}
  coverage: '/Coverage: (\d+\.\d+)%/'   # adjust regex to your coverage reporter
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura.xml     # adjust to your reporter output
    expire_in: 7 days
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "{{MAIN_BRANCH}}"
    - if: $CI_COMMIT_BRANCH == "{{MAIN_BRANCH}}"

coverage-gate:
  stage: release-check
  image: alpine:latest
  script:
    - |
      THRESHOLD={{COVERAGE_THRESHOLD}}
      if [ "$THRESHOLD" = "0" ] || [ "$THRESHOLD" = "N/A" ]; then
        echo "Coverage gate disabled for this project (demo/prototype mode)."
        exit 0
      fi
      # Read coverage from artifact generated by full-test-suite
      # Adjust this to parse your actual coverage output format
      COVERAGE=$(grep -oP 'line-rate="\K[0-9.]+' coverage/cobertura.xml | head -1 | awk '{printf "%.0f", $1 * 100}')
      echo "Coverage: ${COVERAGE}%  |  Threshold: ${THRESHOLD}%"
      if [ "$COVERAGE" -lt "$THRESHOLD" ]; then
        echo "ERROR: Coverage ${COVERAGE}% is below the required ${THRESHOLD}%."
        exit 1
      fi
  needs: ["full-test-suite"]
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "{{MAIN_BRANCH}}"
    - if: $CI_COMMIT_BRANCH == "{{MAIN_BRANCH}}"

security-scan:
  stage: release-check
  allow_failure: false
  script:
    - {{SECURITY_SCAN_CMD}}
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "{{MAIN_BRANCH}}"
    - if: $CI_COMMIT_BRANCH == "{{MAIN_BRANCH}}"

# ─────────────────────────────────────────────
# PROJECT IDENTITY CHECK
#
# Verifies AGENTS.md contains the @project-initializer tag.
# If missing or malformed, the project is not considered
# properly initialized and the pipeline fails.
#
# Suppress with [ignore:project_tag] in commit message only
# when intentionally migrating a legacy project.
# ─────────────────────────────────────────────
project-tag-check:
  stage: release-check
  script:
    - chmod +x scripts/check_project_tag.sh
    - scripts/check_project_tag.sh
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "{{MAIN_BRANCH}}"
    - if: $CI_COMMIT_BRANCH == "{{MAIN_BRANCH}}"

# ─────────────────────────────────────────────
# SDD PROCESS DOCUMENTATION CHECK
#
# Verifies that code changes are backed by corresponding
# SDD process documents (specs / plans / tasks), using
# the framework-specific check script.
#
# Developers can suppress specific checks with structured
# tags in the commit message. See AGENTS.md for the full
# list of ignore tags.
#
# Example:
#   fix: correct null pointer in login [ignore:spec_sync]
#   chore: bump dependencies         [ignore:all_sdd]
# ─────────────────────────────────────────────
sdd-process-check:
  stage: release-check
  <<: *base_cache
  script:
    - chmod +x {{SDD_CHECK_SCRIPT}}
    - {{SDD_CHECK_SCRIPT}}
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "{{MAIN_BRANCH}}"
    - if: $CI_COMMIT_BRANCH == "{{MAIN_BRANCH}}"

# ─────────────────────────────────────────────
# STAGE 3: DEPLOY
# Runs only on pushes to {{MAIN_BRANCH}} after all checks pass.
# Add your deployment steps here.
# ─────────────────────────────────────────────
deploy:
  stage: deploy
  script:
    - echo "TODO: Add deployment commands"
    # Examples:
    # - docker build -t myapp:$CI_COMMIT_SHA .
    # - docker push registry.example.com/myapp:$CI_COMMIT_SHA
    # - kubectl set image deployment/myapp app=registry.example.com/myapp:$CI_COMMIT_SHA
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == "{{MAIN_BRANCH}}"
  when: manual
